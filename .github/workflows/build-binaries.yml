name: Build Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 创建 Release / 上传资产需要 contents: write
# 若仍 403，到仓库 Settings → Actions → General → Workflow permissions
# 勾选 "Read and write permissions"
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build all platform binaries
        run: |
          bun install --frozen-lockfile || bun install
          bun run build:bundle

          # macOS
          bun build dist/bundle.js --compile --outfile dist/zentao-mcp-server-darwin-arm64 --target bun-darwin-arm64
          bun build dist/bundle.js --compile --outfile dist/zentao-mcp-server-darwin-x64 --target bun-darwin-x64

          # Linux
          bun build dist/bundle.js --compile --outfile dist/zentao-mcp-server-linux-x64 --target bun-linux-x64
          bun build dist/bundle.js --compile --outfile dist/zentao-mcp-server-linux-arm64 --target bun-linux-arm64

          # Windows
          bun build dist/bundle.js --compile --outfile dist/zentao-mcp-server-windows-x64.exe --target bun-windows-x64

          # 计算 SHA256
          cd dist
          for file in zentao-mcp-server-*; do
            if [ -f "$file" ]; then
              shasum -a 256 "$file" > "$file.sha256"
            fi
          done
          ls -lh zentao-mcp-server-*

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/zentao-mcp-server-darwin-arm64
            dist/zentao-mcp-server-darwin-arm64.sha256
            dist/zentao-mcp-server-darwin-x64
            dist/zentao-mcp-server-darwin-x64.sha256
            dist/zentao-mcp-server-linux-x64
            dist/zentao-mcp-server-linux-x64.sha256
            dist/zentao-mcp-server-linux-arm64
            dist/zentao-mcp-server-linux-arm64.sha256
            dist/zentao-mcp-server-windows-x64.exe
            dist/zentao-mcp-server-windows-x64.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
